<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https: blob: data:; style-src 'self' 'unsafe-inline' https:; img-src 'self' https: data: blob:; font-src 'self' https: data:; media-src 'self' https: blob:; connect-src 'self' https: wss:; frame-src 'self' https://drive.google.com https://www.youtube.com https://player.vimeo.com; object-src 'none'; base-uri 'self'; form-action 'self';">
    <base href="/" />
    <title>Frames Studio - Premium Portfolio</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      // CONDITIONAL SERVICE WORKER MANAGEMENT
      // Only purge Service Workers if we are on a public portfolio route to ensure playback stability.
      (function() {
        const isPublicRoute = window.location.pathname.includes('/v/') || window.location.hash.includes('/v/');
        
        if (isPublicRoute && 'serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            if (registrations.length > 0) {
                console.log('[Frames] Public Route detected. Unregistering all Service Workers...');
                for(let registration of registrations) {
                  registration.unregister();
                }
                // Reload to ensure a clean slate if a controller was active
                if (navigator.serviceWorker.controller) {
                    window.location.reload();
                }
            }
          });
        }
      })();

      // Suppress benign extension errors
      window.addEventListener('error', function(e) {
        if (e.message && (e.message.includes('rangeCount') || e.message.includes('selection'))) {
          e.preventDefault();
          return true;
        }
      }, true);
      
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Space Grotesk', 'sans-serif'],
            },
            colors: {
              zinc: { 950: '#050505', 900: '#09090b', 800: '#1a1a1e', 700: '#27272a' }
            }
          }
        }
      }
    </script>
    <style>
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #050505; }
      ::-webkit-scrollbar-thumb { background: #1a1a1e; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #27272a; }
      
      html, body {
        background-color: #050505;
        color: #f4f4f5;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        scroll-behavior: smooth;
      }
      
      input:-webkit-autofill,
      input:-webkit-autofill:hover, 
      input:-webkit-autofill:focus {
        -webkit-text-fill-color: white;
        -webkit-box-shadow: 0 0 0px 1000px #09090b inset;
        transition: background-color 5000s ease-in-out 0s;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react/": "https://esm.sh/react@^19.2.3/",

    "lucide-react": "https://esm.sh/lucide-react@^0.561.0",
    "react-easy-crop": "https://esm.sh/react-easy-crop@^5.5.6",
    "@google/genai": "https://esm.sh/@google/genai@^1.33.0",
    "vite": "https://esm.sh/vite@^7.3.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>
